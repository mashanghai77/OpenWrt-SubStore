name: Build luci-app-substore IPK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build
        uses: openwrt/gh-action-sdk@v7
        env:
          ARCH: x86_64-23.05
          FEEDNAME: luci_app_substore
          PACKAGES: luci-app-substore
          NO_REFRESH_CHECK: true

      - name: Collect IPK
        run: |
          mkdir -p output
          find bin/packages/ -name "luci-app-substore*.ipk" -exec cp {} output/ \;
          ls -lh output/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-substore-all
          path: output/*.ipk

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ github.run_number }}
          name: Build ${{ github.run_number }}
          files: output/*.ipk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
